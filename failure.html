<!DOCTYPE html>                                                                                                                           
    <html>                                                                                                                                        
    <head>                                                                                                                                        
        <title>Plată Eșuată</title>                                                                                                               
        <meta name="viewport" content="width=device-width, initial-scale=1">                                                                      
        <style>                                                                                                                                   
            body { font-family: -apple-system, sans-serif; text-align: center; padding-top: 100px; background-color: #f6f9fc; color: #333; }      
            .spinner { border: 4px solid rgba(0,0,0,.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #F44336; animation:    
  spin 1s linear infinite; margin: 0 auto 20px; }                                                                                                 
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }                   
            .button { display: inline-block; margin-top: 20px; padding: 12px 24px; background-color: #4CAF50; color: white; text-decoration:  
  none; border-radius: 4px; font-weight: bold; }   
        </style>                                                                                                                                  
    </head>                                                                                                                                       
    <body>                                                                                                                                        
        <div class="spinner"></div>                                                                                                               
        <h2>Tranzacție eșuată</h2>                                                                                                                
        <p>Te întorci în aplicație...</p>                                                                                                      
                                                                                                                                              
        <!-- Fallback button in case browser blocks automatic redirect -->                                                                    
        <a id="redirect-button" class="button" href="#">Apasă aici dacă nu te-ai redirecționat</a>                                            
                                                                                                                                              
        <script>                                                                                                                              
            // 1. SET TO true FOR EXPO GO TESTING, set to false FOR PRODUCTION BUILD                                                          
            const DEV_MODE = true;                                                                                                            
                                                                                                                                              
            // 2. Configure package and scheme names                                                                                          
            const PRODUCTION_SCHEME = "myapp";                                                                                                
            const PRODUCTION_PACKAGE = "com.bogmihut8.MBMobile"; // <-- Set this to your new package name!                                    
                                                                                                                                              
            const search = window.location.search;                                                                                            
            const params = search ? '&' + search.substring(1) : '';                                                                           
            const isAndroid = /Android/i.test(navigator.userAgent);                                                                           
                                                                                                                                              
            let redirectUrl = "";                                                                                                             
                                                                                                                                              
            if (DEV_MODE) {                                                                                                                   
                // Testing in Expo Go (Localhost packager bridge on Android)                                                                  
                redirectUrl = "exp://192.168.1.140:8081/--/payment-redirect?status=failure" + params;                                              
            } else {                                                                                                                          
                // Production standalone build                                                                                                
                if (isAndroid) {                                                                                                              
                    redirectUrl = "intent://payment-redirect?status=failure" + params + 
                                  "#Intent;scheme=" + PRODUCTION_SCHEME + 
                                  ";package=" + PRODUCTION_PACKAGE + ";end;";
                } else {
                    redirectUrl = PRODUCTION_SCHEME + "://payment-redirect?status=failure" + params;
                }
            }
  
            // Set the fallback button link
            document.getElementById("redirect-button").href = redirectUrl;
  
            // Try automatic redirect
            window.location.href = redirectUrl;
        </script>
    </body>
    </html>
