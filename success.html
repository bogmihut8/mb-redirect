<!DOCTYPE html>                                                                                                                           
    <html>                                                                                                                                    
    <head>                                                                                                                                    
        <title>Plată Reușită</title>                                                                                                          
        <meta name="viewport" content="width=device-width, initial-scale=1">                                                                  
        <style>                                                                                                                               
            body { font-family: -apple-system, sans-serif; text-align: center; padding-top: 100px; background-color: #f6f9fc; color: #333; }  
            .spinner { border: 4px solid rgba(0,0,0,.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #4CAF50; animation:
  spin 1s linear infinite; margin: 0 auto 20px; }                                                                                             
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }                                           
            .button { display: inline-block; margin-top: 20px; padding: 14px 28px; background-color: #4CAF50; color: white; text-decoration:  
  none; border-radius: 6px; font-weight: bold; font-size: 16px; }                                                                             
        </style>                                                                                                                              
    </head>                                                                                                                                   
    <body>                                                                                                                                    
        <div class="spinner"></div>                                                                                                           
        <h2>Plată confirmată!</h2>                                                                                                            
        <p>Te întorci în aplicație...</p>                                                                                                     
                                                                                                                                              
        <a id="redirect-button" class="button" href="#">Deschide Aplicația</a>                                                                
                                                                                                                                              
        <script>                                                                                                                              
            const DEV_MODE = false; // Set to true only when testing in Expo Go                                                               
                                                                                                                                              
            const search = window.location.search;                                                                                            
            const params = search ? '&' + search.substring(1) : '';                                                                           
                                                                                                                                              
            let targetUrl = "";                                                                                                               
                                                                                                                                              
            if (DEV_MODE) {                                                                                                                   
                targetUrl = "exp://192.168.1.140:8081/--/payment-redirect?status=success" + params;                                           
            } else {                                                                                                                          
                // Direct custom scheme works on both iOS and Android preview APKs                                                            
                targetUrl = "myapp://payment-redirect?status=success" + params;                                                               
            }                                                                                                                                 
                                                                                                                                              
            // 1. Set fallback button link                                                                                                    
            const btn = document.getElementById("redirect-button");                                                                           
            btn.href = targetUrl;                                                                                                             
                                                                                                                                              
            // 2. Auto-redirect                                                                                                               
            window.location.href = targetUrl;                                                                                                 
        </script>                                                                                                                             
    </body>                                                                                                                                   
    </html>
