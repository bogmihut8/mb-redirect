<!DOCTYPE html>                                                                                                                               
    <html>                                                                                                                                        
    <head>                                                                                                                                        
        <title>Plata Reușită</title>                                                                                                              
        <meta name="viewport" content="width=device-width, initial-scale=1">                                                                      
        <style>                                                                                                                                   
            body { font-family: -apple-system, sans-serif; text-align: center; padding-top: 100px; background-color: #f6f9fc; color: #333; }      
            .spinner { border: 4px solid rgba(0,0,0,.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #4CAF50; animation:    
  spin 1s linear infinite; margin: 0 auto 20px; }                                                                                                 
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }                                               
        </style>                                                                                                                                  
    </head>                                                                                                                                       
    <body>                                                                                                                                        
        <div class="spinner"></div>                                                                                                               
        <h2>Plată confirmată!</h2>                                                                                                                
        <p>Te întorci în aplicație...</p>                                                                                                         
        <script>                                                                                                                                  
            // Redirect back to the app using custom scheme, forwarding the Viva payment query params                                             
            window.location.href = "myapp://payment-redirect" + window.location.search;                                                           
        </script>                                                                                                                                 
    </body>                                                                                                                                       
    </html>
